version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: todo_postgres
    env_file:
      - "./.env"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    container_name: todo_backend
    ports:
      - "3000:3000"
    env_file:
      - "./.env"
    depends_on:
      - postgres-db

  frontend:
    build: ./client
    container_name: todo_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
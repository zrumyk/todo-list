version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: todo_postgres
    env_file:
      - "./.env"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: ghcr.io/zrumyk/todo-list-backend:latest
    container_name: todo_backend
    env_file:
      - "./.env"
    depends_on:
      - postgres-db
    restart: always

  frontend:
    image: ghcr.io/zrumyk/todo-list-frontend:latest
    container_name: todo_frontend
    env_file:
      - "./.env.production"
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: